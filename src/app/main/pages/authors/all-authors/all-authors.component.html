<app-sidebar></app-sidebar>
<div class="all-authors" *ngFor="let author of authors">
  <app-list-item
    [name]="author.name"
    [bio]="author.bio"
    [link]="author.link"
    [isFavorite]="author.isFavorite"
    (addFvt)="add(author)"
    (removeFvt)="remove(author)"
  ></app-list-item>
</div>
<div *ngIf="hasData" class="paginator">
  <button class="previous" (click)="onPrev($event)">Previous</button>
  <button class="next" (click)="onNext($event)">Next</button>
</div>
