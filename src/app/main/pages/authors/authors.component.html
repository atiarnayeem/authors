<div class="main">
  <div class="favorite-authors">
    <h2>Author</h2>
    <h3>Favorite Author</h3>
  </div>
  <div class="all-authors">
    <div *ngFor="let author of authors">
      <app-list-item [name]="author.name" [bio]="author.bio" [link]="author.link" (myClick)="firstFunction()" (myClick2)="secondFunction()"></app-list-item>
    </div>
  </div>
</div>
